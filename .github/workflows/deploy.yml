name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22   # Wrangler 4 requires Node >= 22
          cache: npm

      - run: npm ci

      - name: Run unit tests (gates the deploy)
        run: npm test

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Uploads public/ as static assets + functions/ as the proxy.
          # --branch=main marks it a PRODUCTION deploy (matches the project's production branch).
          command: pages deploy public --project-name=buswhensg --branch=main
