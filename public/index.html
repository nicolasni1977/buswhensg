<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BusWhenSG - A high-contrast, accessible Singapore bus arrival checker designed for elderly and non-technical users.">
    <title>BusWhenSG | Simple Bus Arrivals</title>
    
    <!-- Leaflet.js for Map Integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="styles.css">
    <!-- Fonts required by the design system -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="theme-light">
    <!-- Accessibility: Skip to main content link -->
    <a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to Main Content</a>

    <!-- HEADER: Global Controls & Favorites -->
    <header class="header" role="banner">
        <div class="container">
            <div class="header__content">
                <div class="header__top-row">
                    <h1 class="app-logo">BusWhenSG</h1>
                    
                    <div class="global-controls" role="group" aria-label="Settings">
                        <div class="control-item">
                            <button id="toggle-dark-light" aria-label="Toggle Dark and Light Mode" title="Toggle Theme">
                               <svg class="icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                            </button>
                        </div>
                        <div class="control-item">
                            <button id="toggle-text-size" aria-label="Increase text size" title="Text Size">A</button>
                        </div>
                        <div class="language-toggle" role="group" aria-label="Language Selection">
                            <button data-lang="en" aria-pressed="true">EN</button>
                            <button data-lang="zh" aria-pressed="false">中文</button>
                            <button data-lang="ms" aria-pressed="false">BM</button>
                        </div>
                    </div>
                </div>

                <section class="favorite-stops-section" aria-label="Quick Access Favorite Stops">
                    <h3 class="section-subtitle sr-only" data-i18n="quick_favorites">Quick Access Favorites</h3>
                    <div id="favorites-container" class="favorite-card-list">
                        <!-- Favorites populated by JS -->
                    </div>
                </section>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main id="main-content" class="container" role="main">

        <!-- SECTION 1: Search & Map -->
        <section id="search-locator" class="section" aria-labelledby="search-title">
            <h2 id="search-title" class="section__title" data-i18n="find_your_bus">Find Your Bus Stop</h2>
            
            <div class="search-map-grid">
                <div class="search-controls">
                    <div class="input-search-container">
                        <label for="stop-search" class="sr-only" data-i18n="search_label">Search by Stop Code or Name</label>
                        <input type="text" id="stop-search" placeholder="Search by Stop Code or Name...">
                        <div class="search-actions">
                            <button id="search-button" class="button-primary">
                               <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
                               <span data-i18n="search_btn">Search</span>
                            </button>
                            <button id="geo-button" class="button-primary button-secondary-style">
                               <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="3"/></svg>
                               <span data-i18n="near_me">Near Me</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="map-wrapper" class="map-wrapper">
                    <div id="map"></div>
                    <div class="map-attribution">
                        <img src="https://www.onemap.gov.sg/favicon.ico" alt="OneMap Logo" width="16" height="16">
                        Map data &copy; OneMap | Singapore Land Authority
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION 2: Arrivals List -->
        <section id="arrival-display" class="section" aria-labelledby="arrivals-heading">
            <div class="arrivals-header">
                <h2 id="arrivals-heading" class="section__title" data-i18n="arrivals">Arrivals</h2>
                <div class="refresh-bar">
                    <div class="status-stamp" role="status" aria-live="polite">
                        <span data-i18n="updated_ago">Updated</span> <span id="last-updated">--</span>s ago
                    </div>
                    <button id="refresh-button" class="button-primary button-circular" aria-label="Refresh arrivals">
                        <svg class="icon" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.82 4.36L18.5 10.5M20.49 15a9 9 0 01-14.82-4.36L5.5 13.5"/></svg>
                    </button>
                </div>
            </div>

            <div id="arrival-list" class="arrival-list" aria-live="polite">
                <div class="initial-placeholder">
                    <p data-i18n="select_stop_prompt">Please select a stop or use "Near Me" to view real-time arrivals.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
